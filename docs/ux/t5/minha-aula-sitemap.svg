      .white { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .shared { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; }
      .teacher { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.8; }
      .student { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.8; }
      .callout { fill: #fff7ed; stroke: #f59e0b; stroke-width: 1.5; stroke-dasharray: 6 4; }
      .groupTeacher { fill: #f8fbff; stroke: #bfdbfe; stroke-width: 2; }
      .groupStudent { fill: #f7fff9; stroke: #bbf7d0; stroke-width: 2; }
      .line { stroke: #475569; stroke-width: 2.2; stroke-linecap: round; marker-end: url(#arrow); }
      .branch { stroke: #94a3b8; stroke-width: 2; stroke-linecap: round; marker-end: url(#arrow); }
