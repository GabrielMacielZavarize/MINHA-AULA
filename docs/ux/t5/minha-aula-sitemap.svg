<svg width="1800" height="1280" viewBox="0 0 1800 1280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569" />
    </marker>
    <style>
      .title { font: 700 34px 'Inter', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 17px 'Inter', Arial, sans-serif; fill: #475569; }
      .section { font: 700 22px 'Inter', Arial, sans-serif; fill: #0f172a; }
